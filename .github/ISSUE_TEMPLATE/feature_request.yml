name: ✨ Feature request
description: Suggest an improvement or new capability.
title: "[FEATURE] "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.

        Please keep the request focused. For large changes, describe the problem first before proposing an implementation.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Who benefits from it?
      placeholder: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
      placeholder: Describe the behavior, API, UI, documentation, or workflow you are proposing.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workarounds or alternative designs you considered.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Select the closest matching area.
      options:
        - Documentation
        - Developer experience
        - User interface
        - Runtime behavior
        - Build or dependencies
        - Tests or CI
        - Release or deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add links, screenshots, examples, prior art, constraints, or compatibility concerns.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this request.
          required: true
        - label: I have described the problem or motivation, not only an implementation.
          required: true
